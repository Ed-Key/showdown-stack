name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  proxy-tests:
    name: Proxy tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run pytest
        run: uv run pytest -q

  extension-tests:
    name: Extension tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm test

  dashboard-build:
    name: Dashboard build (tsc + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-web/package-lock.json
      - run: npm ci
      - run: npm run build
